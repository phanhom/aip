openapi: "3.1.0"

info:
  title: Agent Interaction Protocol (AIP)
  version: "1.0.0"
  description: |
    Open protocol for structured agent-to-agent and human-to-agent communication.
    
    AIP uses URL path versioning (e.g., `/v1/`) following the same pattern as OpenAI, Stripe, and other widely adopted APIs.
    
    AIP defines two versioned endpoints:
    - `POST /v1/aip` — Send a structured message to an agent.
    - `GET /v1/status` — Discover an agent's identity, health, capabilities, and subordinates.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: AIP Protocol
    url: https://github.com/aip-protocol

servers:
  - url: https://agent.example.com
    description: Example AIP-compliant agent

paths:
  /v1/aip:
    post:
      operationId: sendMessage
      summary: Send an AIP message
      description: |
        Send a structured message to an agent. The agent processes the message
        and returns an acknowledgment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIPMessage"
            examples:
              assign_task:
                summary: Assign a task to a worker agent
                value:
                  version: "1.0"
                  message_id: "msg-001"
                  from: "coordinator"
                  to: "agent-backend"
                  from_role: "coordinator"
                  to_role: "backend_engineer"
                  action: "assign_task"
                  intent: "Design the order service REST API"
                  payload:
                    instruction: "Define REST endpoints, error codes, and schemas"
                    deliverables: ["openapi", "risk_report"]
                  priority: "high"
              submit_report:
                summary: Worker submits a report
                value:
                  version: "1.0"
                  message_id: "msg-002"
                  correlation_id: "corr-001"
                  from: "agent-backend"
                  to: "coordinator"
                  action: "submit_report"
                  intent: "Order service API draft completed"
                  payload:
                    summary: "API draft complete"
                    artifacts: ["openapi/orders.yaml"]
                  status: "Completed"
      responses:
        "200":
          description: |
            Message accepted. Response format depends on the Accept header:
            - `Accept: text/event-stream` (default): SSE stream with status/message/artifact/done events
            - `Accept: application/json`: Single JSON AIPAck
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIPAck"
              example:
                ok: true
                message_id: "msg-001"
                to: "agent-backend"
                status: "received"
                task_id: "task-001"
            text/event-stream:
              schema:
                type: string
                description: SSE event stream (event types: status, message, artifact, error, done)
        "400":
          description: Routing error (e.g., `to` does not match receiving agent)
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "422":
          description: Message validation failed
        "429":
          description: Rate limited
        "503":
          description: Upstream or forwarding target unavailable

  /v1/status:
    get:
      operationId: getStatus
      summary: Get agent status
      description: |
        Returns the agent's identity, health, capabilities, and optionally
        its subordinates. Use the `scope` parameter to control depth.
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [self, subtree, group]
            default: self
          description: |
            - `self`: Current agent only (default for workers)
            - `subtree`: Agent and all subordinates as a recursive tree
            - `group`: Flat aggregate of the entire group (coordinators only)
        - name: root
          in: query
          required: false
          schema:
            type: string
          description: |
            For `scope=subtree`, specifies the root agent ID. 
            Only applicable for coordinators.
      responses:
        "200":
          description: Agent status
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AgentStatus"
                  - $ref: "#/components/schemas/RecursiveStatusNode"
                  - $ref: "#/components/schemas/GroupStatus"
              examples:
                self:
                  summary: Single agent status (scope=self)
                  value:
                    agent_id: "agent-backend"
                    role: "backend_engineer"
                    superior: "coordinator"
                    lifecycle: "running"
                    ok: true
                    base_url: "https://agent-backend.example.com"
                    endpoints:
                      aip: "https://agent-backend.example.com/v1/aip"
                      status: "https://agent-backend.example.com/v1/status"
                    capabilities: ["assign_task", "submit_report"]
                    supported_versions: ["1.0"]
                    pending_tasks: 2
                group:
                  summary: Group status (scope=group)
                  value:
                    ok: true
                    service: "my-agents"
                    root_agent_id: "coordinator"
                    timestamp: "2026-03-12T10:00:00Z"
                    topology:
                      coordinator: ["agent-backend", "agent-frontend"]
                    agents:
                      - agent_id: "coordinator"
                        role: "coordinator"
                        lifecycle: "running"
                        ok: true
                      - agent_id: "agent-backend"
                        role: "backend_engineer"
                        lifecycle: "running"
                        ok: true

  /v1/tasks/{task_id}:
    get:
      operationId: getTask
      summary: Get task state
      description: Retrieve full task state, artifacts, and message history.
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIPTask"
        "404":
          description: Task not found

  /v1/tasks/{task_id}/cancel:
    post:
      operationId: cancelTask
      summary: Cancel a task
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task canceled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIPTask"
        "404":
          description: Task not found

  /v1/tasks/{task_id}/send:
    post:
      operationId: sendToTask
      summary: Send follow-up message into an existing task
      description: Used to provide additional input when a task is in `input-required` state.
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIPMessage"
      responses:
        "200":
          description: Message accepted into task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIPAck"
        "404":
          description: Task not found

components:
  schemas:
    AIPMessage:
      type: object
      required: [version, message_id, from, to, action, intent]
      description: AIP message envelope.
      properties:
        version:
          type: string
          default: "1.0"
        message_id:
          type: string
        correlation_id:
          type: ["string", "null"]
        trace_id:
          type: ["string", "null"]
        parent_task_id:
          type: ["string", "null"]
        from:
          type: string
        to:
          type: string
        from_role:
          type: ["string", "null"]
        to_role:
          type: ["string", "null"]
        to_host:
          type: ["string", "null"]
        to_base_url:
          type: ["string", "null"]
          format: uri
        route_scope:
          type: string
          enum: [local, remote]
          default: local
        action:
          type: string
        intent:
          type: string
        payload:
          type: object
          default: {}
          additionalProperties: true
        expected_output:
          type: ["string", "null"]
        constraints:
          type: array
          items:
            type: string
          default: []
        priority:
          type: string
          enum: [low, normal, high, urgent]
          default: normal
        status:
          type: string
          enum: [Pending, InProgress, Completed, Failed]
          default: Pending
        authority_weight:
          type: integer
          minimum: 0
          maximum: 100
          default: 50
        requires_approval:
          type: boolean
          default: false
        approval_state:
          type: string
          enum: [not_required, waiting_human, approved, rejected]
          default: not_required
        callback_url:
          type: ["string", "null"]
          format: uri
          description: Webhook URL where the receiver should POST task results upon completion.
        callback_secret:
          type: ["string", "null"]
          description: Shared secret for HMAC-SHA256 signature verification of callback payloads.
        retries:
          type: integer
          minimum: 0
          default: 0
        latency_ms:
          type: ["integer", "null"]
        error_code:
          type: ["string", "null"]
        error_message:
          type: ["string", "null"]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AIPAck:
      type: object
      required: [ok, message_id, to, status]
      description: Standard acknowledgment for POST /aip.
      properties:
        ok:
          type: boolean
        message_id:
          type: string
        to:
          type: string
        status:
          type: string
          enum: [received, queued, rejected]
        task_id:
          type: ["string", "null"]
          description: Task identifier if the message triggered a task.
        error_code:
          type: ["string", "null"]
          description: Machine-readable error code (present when ok is false).
        error_message:
          type: ["string", "null"]
          description: Human-readable error description (present when ok is false).
        correlation_id:
          type: ["string", "null"]

    AIPTask:
      type: object
      required: [task_id, message_id, state, from, to, action, intent, created_at, updated_at]
      description: A long-running task tracked by the agent.
      properties:
        task_id:
          type: string
        message_id:
          type: string
        state:
          type: string
          enum: [submitted, working, input-required, completed, failed, canceled]
        from:
          type: string
        to:
          type: string
        action:
          type: string
        intent:
          type: string
        progress:
          type: ["number", "null"]
          minimum: 0
          maximum: 1
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/Artifact"
          default: []
        history:
          type: array
          items:
            type: object
          default: []
        error_code:
          type: ["string", "null"]
        error_message:
          type: ["string", "null"]
        metadata:
          type: ["object", "null"]
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Artifact:
      type: object
      required: [artifact_id, name, mime_type]
      description: A file, document, or structured data produced during task execution.
      properties:
        artifact_id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        mime_type:
          type: string
        uri:
          type: ["string", "null"]
          format: uri
        inline_data:
          type: ["string", "null"]
          description: Base64-encoded content for small artifacts.
        metadata:
          type: ["object", "null"]
          additionalProperties: true

    Skill:
      type: object
      required: [id, name, description]
      description: Structured skill descriptor for rich agent discovery.
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
          default: []
        input_modes:
          type: array
          items:
            type: string
          default: ["application/json"]
        output_modes:
          type: array
          items:
            type: string
          default: ["application/json"]
        input_schema:
          type: ["object", "null"]
          additionalProperties: true
        output_schema:
          type: ["object", "null"]
          additionalProperties: true
        examples:
          type: array
          items:
            type: object
          default: []

    AuthenticationInfo:
      type: object
      description: Authentication schemes supported by the agent.
      properties:
        schemes:
          type: array
          items:
            type: string
          default: []
        oauth2:
          type: ["object", "null"]
          properties:
            token_url:
              type: string
              format: uri
            scopes:
              type: array
              items:
                type: string

    RateLimitInfo:
      type: object
      description: Rate limiting and quota information for client self-regulation.
      properties:
        max_requests_per_minute:
          type: ["integer", "null"]
          minimum: 0
          description: Maximum POST /v1/aip requests per minute. null = unlimited.
        max_requests_per_day:
          type: ["integer", "null"]
          minimum: 0
          description: Maximum requests per calendar day (UTC). null = unlimited.
        max_concurrent_tasks:
          type: ["integer", "null"]
          minimum: 0
          description: Maximum simultaneous tasks in non-terminal state. null = unlimited.
        remaining_requests:
          type: ["integer", "null"]
          minimum: 0
          description: Remaining requests in the current minute window.
        remaining_tasks:
          type: ["integer", "null"]
          minimum: 0
          description: Remaining task slots available.
        reset_at:
          type: ["string", "null"]
          format: date-time
          description: ISO 8601 UTC timestamp when the rate limit window resets.

    StatusEndpoints:
      type: object
      properties:
        aip:
          type: ["string", "null"]
          format: uri
        status:
          type: ["string", "null"]
          format: uri

    WorkSnapshot:
      type: object
      properties:
        tasks:
          type: array
          items:
            type: object
          default: []
        reports:
          type: array
          items:
            type: object
          default: []
        recent_messages:
          type: array
          items:
            type: object
          default: []
        last_seen:
          type: ["string", "null"]
          format: date-time
        pending_tasks:
          type: integer
          minimum: 0
          default: 0

    AgentStatus:
      type: object
      required: [agent_id, role]
      description: Status document for a single agent.
      properties:
        agent_id:
          type: string
        role:
          type: string
        superior:
          type: ["string", "null"]
        authority_weight:
          type: ["integer", "null"]
        lifecycle:
          type: ["string", "null"]
          enum: [idle, starting, running, blocked, degraded, failed, null]
        port:
          type: ["integer", "null"]
        ok:
          type: boolean
          default: true
        base_url:
          type: ["string", "null"]
          format: uri
        endpoints:
          oneOf:
            - $ref: "#/components/schemas/StatusEndpoints"
            - type: "null"
        capabilities:
          type: array
          items:
            type: string
          default: []
        skills:
          type: array
          items:
            $ref: "#/components/schemas/Skill"
          default: []
        supported_versions:
          type: array
          items:
            type: string
          default: ["1.0"]
        authentication:
          oneOf:
            - $ref: "#/components/schemas/AuthenticationInfo"
            - type: "null"
        rate_limits:
          oneOf:
            - $ref: "#/components/schemas/RateLimitInfo"
            - type: "null"
          description: Rate limiting and quota information.
        pending_tasks:
          type: integer
          default: 0
        recent_errors:
          type: integer
          default: 0
        waiting_for_approval:
          type: boolean
          default: false
        last_message_at:
          type: ["string", "null"]
          format: date-time
        last_seen_at:
          type: ["string", "null"]
          format: date-time
        metadata:
          type: ["object", "null"]
          additionalProperties: true
        work:
          oneOf:
            - $ref: "#/components/schemas/WorkSnapshot"
            - type: "null"

    RecursiveStatusNode:
      type: object
      required: [self]
      description: Recursive status tree.
      properties:
        self:
          $ref: "#/components/schemas/AgentStatus"
        subordinates:
          type: array
          items:
            $ref: "#/components/schemas/RecursiveStatusNode"
          default: []

    GroupStatus:
      type: object
      required: [ok, root_agent_id, agents]
      description: Flat group-wide status document.
      properties:
        ok:
          type: boolean
        service:
          type: string
          default: aip
        root_agent_id:
          type: string
        timestamp:
          type: string
          format: date-time
        topology:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          default: {}
        waiting_for_approval:
          type: boolean
          default: false
        agents:
          type: array
          items:
            $ref: "#/components/schemas/AgentStatus"
