openapi: "3.1.0"

info:
  title: Agent Interaction Protocol (AIP)
  version: "1.3.0"
  description: |
    Open protocol for structured agent-to-agent and human-to-agent communication.
    
    AIP uses URL path versioning (e.g., `/v1/`) following the same pattern as OpenAI, Stripe, and other widely adopted APIs.
    
    AIP defines two versioned endpoints:
    - `POST /v1/aip` — Send a structured message to an agent.
    - `GET /v1/status` — Discover an agent's identity, health, capabilities, and subordinates.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: AIP Protocol
    url: https://github.com/aip-protocol

servers:
  - url: https://agent.example.com
    description: Example AIP-compliant agent

paths:
  /v1/aip:
    post:
      operationId: sendMessage
      summary: Send an AIP message
      description: |
        Send a structured message to an agent. The agent processes the message
        and returns an acknowledgment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIPMessage"
            examples:
              assign_task:
                summary: Assign a task to a worker agent
                value:
                  version: "1.0"
                  message_id: "msg-001"
                  from: "coordinator"
                  to: "agent-backend"
                  from_role: "coordinator"
                  to_role: "backend_engineer"
                  action: "assign_task"
                  intent: "Design the order service REST API"
                  payload:
                    instruction: "Define REST endpoints, error codes, and schemas"
                    deliverables: ["openapi", "risk_report"]
                  priority: "high"
              submit_report:
                summary: Worker submits a report
                value:
                  version: "1.0"
                  message_id: "msg-002"
                  correlation_id: "corr-001"
                  from: "agent-backend"
                  to: "coordinator"
                  action: "submit_report"
                  intent: "Order service API draft completed"
                  payload:
                    summary: "API draft complete"
                    artifacts: ["openapi/orders.yaml"]
                  status: "Completed"
      responses:
        "200":
          description: |
            Message accepted. Response format depends on the Accept header:
            - `Accept: text/event-stream` (default): SSE stream with status/message/artifact/done events
            - `Accept: application/json`: Single JSON AIPAck
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIPAck"
              example:
                ok: true
                message_id: "msg-001"
                to: "agent-backend"
                status: "received"
                task_id: "task-001"
            text/event-stream:
              schema:
                type: string
                description: SSE event stream (event types: status, message, artifact, error, done)
        "400":
          description: Routing error (e.g., `to` does not match receiving agent)
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "422":
          description: Message validation failed
        "429":
          description: Rate limited
        "503":
          description: Upstream or forwarding target unavailable

  /v1/status:
    get:
      operationId: getStatus
      summary: Get agent status
      description: |
        Returns the agent's identity, health, capabilities, and optionally
        its subordinates. Use the `scope` parameter to control depth.
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [self, subtree, group]
            default: self
          description: |
            - `self`: Current agent only (default for workers)
            - `subtree`: Agent and all subordinates as a recursive tree
            - `group`: Flat aggregate of the entire group (coordinators only)
        - name: root
          in: query
          required: false
          schema:
            type: string
          description: |
            For `scope=subtree`, specifies the root agent ID. 
            Only applicable for coordinators.
      responses:
        "200":
          description: Agent status
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AgentStatus"
                  - $ref: "#/components/schemas/RecursiveStatusNode"
                  - $ref: "#/components/schemas/GroupStatus"
              examples:
                self:
                  summary: Single agent status (scope=self)
                  value:
                    agent_id: "agent-backend"
                    role: "backend_engineer"
                    namespace: "acme-corp"
                    presentation:
                      display_name: "Backend Engineer"
                      tagline: "Designs and reviews REST APIs with OpenAPI output"
                      icon_url: "https://cdn.example.com/agents/backend-eng.png"
                      color: "#4A90D9"
                      locale: "en"
                      categories: ["engineering", "backend"]
                      provider:
                        name: "Acme Corp"
                        url: "https://acme.example.com"
                    superior: "coordinator"
                    lifecycle: "running"
                    ok: true
                    base_url: "https://agent-backend.example.com"
                    endpoints:
                      aip: "https://agent-backend.example.com/v1/aip"
                      status: "https://agent-backend.example.com/v1/status"
                    capabilities: ["assign_task", "submit_report"]
                    supported_versions: ["1.0"]
                    pending_tasks: 2
                group:
                  summary: Group status (scope=group)
                  value:
                    ok: true
                    service: "my-agents"
                    root_agent_id: "coordinator"
                    timestamp: "2026-03-12T10:00:00Z"
                    topology:
                      coordinator: ["agent-backend", "agent-frontend"]
                    agents:
                      - agent_id: "coordinator"
                        role: "coordinator"
                        lifecycle: "running"
                        ok: true
                      - agent_id: "agent-backend"
                        role: "backend_engineer"
                        lifecycle: "running"
                        ok: true

  /v1/tasks/{task_id}:
    get:
      operationId: getTask
      summary: Get task state
      description: Retrieve full task state, artifacts, and message history.
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIPTask"
        "404":
          description: Task not found

  /v1/tasks/{task_id}/cancel:
    post:
      operationId: cancelTask
      summary: Cancel a task
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task canceled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIPTask"
        "404":
          description: Task not found

  /v1/tasks/{task_id}/send:
    post:
      operationId: sendToTask
      summary: Send follow-up message into an existing task
      description: Used to provide additional input when a task is in `input-required` state.
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIPMessage"
      responses:
        "200":
          description: Message accepted into task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIPAck"
        "404":
          description: Task not found

  /v1/artifacts:
    post:
      operationId: uploadArtifact
      summary: Upload an artifact (file)
      description: |
        Upload a file via multipart/form-data. Returns an Artifact with a server-assigned URI.
        Any MIME type is accepted. Servers SHOULD support uploads of at least 100 MB.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload.
                name:
                  type: string
                  description: Human-readable name. Defaults to the uploaded filename.
                description:
                  type: string
                  description: Description of the artifact.
                task_id:
                  type: string
                  description: Associate this artifact with an existing task.
                metadata:
                  type: string
                  description: JSON-encoded metadata object.
      responses:
        "201":
          description: Artifact uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactUploadResponse"
        "413":
          description: File too large
        "415":
          description: Unsupported media type (must be multipart/form-data)

  /v1/artifacts/{artifact_id}:
    get:
      operationId: getArtifact
      summary: Fetch artifact content
      description: Download raw artifact content with the original Content-Type.
      parameters:
        - name: artifact_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Artifact content
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Artifact not found

  /v1/traces:
    post:
      operationId: emitTraces
      summary: Emit trace events
      description: |
        Submit one or more trace events for observability.
        Events are stored and queryable via GET /v1/traces.
      tags: [observability]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TraceBatch"
      responses:
        "200":
          description: Events accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: integer
    get:
      operationId: queryTraces
      summary: Query trace events
      description: |
        Retrieve trace events with filtering, pagination, and ordering.
      tags: [observability]
      parameters:
        - name: agent_id
          in: query
          schema:
            type: string
        - name: trace_id
          in: query
          schema:
            type: string
        - name: trace_type
          in: query
          schema:
            type: string
        - name: task_id
          in: query
          schema:
            type: string
        - name: severity
          in: query
          schema:
            type: string
            enum: [TRACE, DEBUG, INFO, WARN, ERROR, FATAL]
        - name: namespace
          in: query
          schema:
            type: string
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Paginated trace events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceQueryResult"

  /v1/traces/{event_id}:
    get:
      operationId: getTraceEvent
      summary: Get a single trace event
      tags: [observability]
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Trace event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceEvent"
        "404":
          description: Event not found

  /v1/usage:
    get:
      operationId: getUsageSummary
      summary: Aggregated LLM usage and cost summary
      tags: [observability]
      parameters:
        - name: namespace
          in: query
          schema:
            type: string
        - name: agent_id
          in: query
          schema:
            type: string
        - name: model
          in: query
          schema:
            type: string
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          schema:
            type: string
            format: date-time
        - name: group_by
          in: query
          schema:
            type: string
            enum: [model, agent, hour, day]
            default: model
      responses:
        "200":
          description: Usage summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageSummary"

  # ── Multi-Agent Gateway endpoints ──────────────────────────────

  /v1/agents:
    get:
      operationId: listHostedAgents
      summary: Discover all agents hosted on this gateway
      description: |
        Returns an array of AgentStatus objects — one per hosted agent.
        Single-agent hosts MAY return a single-element array.
      tags: [gateway]
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentStatus"

  /v1/agents/{agent_id}/status:
    get:
      operationId: getHostedAgentStatus
      summary: Status of a specific hosted agent
      tags: [gateway]
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStatus"
        "404":
          description: Agent not found on this gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIPAck"

  /v1/agents/{agent_id}/aip:
    post:
      operationId: sendToHostedAgent
      summary: Send an AIPMessage to a specific hosted agent
      tags: [gateway]
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIPMessage"
      responses:
        "200":
          description: AIP acknowledgment (JSON)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIPAck"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIPAck"
        "503":
          description: Agent backend unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIPAck"

  /v1/registry/agents:
    post:
      operationId: registerAgent
      summary: Register an external agent with the platform
      description: |
        An agent announces itself to the platform by providing its base_url.
        The platform probes GET {base_url}/v1/status to validate and enrich the registration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRegistration"
      responses:
        "201":
          description: Agent registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRegistrationResponse"
        "409":
          description: Agent already registered in this namespace
        "422":
          description: Platform could not reach the agent's status endpoint
    get:
      operationId: listAgents
      summary: List registered agents
      description: List all registered agents with optional filtering.
      parameters:
        - name: namespace
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
        - name: lifecycle
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: ok
          in: query
          schema:
            type: boolean
        - name: q
          in: query
          schema:
            type: string
          description: Free-text search across display_name, tagline, skills.
      responses:
        "200":
          description: List of registered agents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRegistryList"

  /v1/registry/agents/{agent_id}:
    get:
      operationId: getRegisteredAgent
      summary: Get a registered agent
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent registration record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRegistrationRecord"
        "404":
          description: Agent not found
    delete:
      operationId: deregisterAgent
      summary: Deregister an agent
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Agent deregistered
        "404":
          description: Agent not found

  /v1/registry/agents/{agent_id}/probe:
    post:
      operationId: probeAgent
      summary: Platform-initiated health check (retry / reconnect)
      description: |
        Immediately probe a registered agent to check if it has recovered.
        The platform calls GET {stored_base_url}/v1/status and updates the
        registry accordingly. Idempotent — safe to call on healthy agents.
      tags: [registry]
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent is reachable — status refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbeResult"
        "404":
          description: Agent not found in registry
        "422":
          description: Agent unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbeResult"

  /v1/registry/agents/{agent_id}/heartbeat:
    post:
      operationId: agentHeartbeat
      summary: Agent heartbeat
      description: Registered agents send periodic heartbeats to signal liveness.
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Heartbeat"
      responses:
        "200":
          description: Heartbeat acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeartbeatAck"
        "404":
          description: Agent not registered

components:
  schemas:
    AgentRegistration:
      type: object
      required: [base_url]
      description: Request to register an external agent with the platform.
      properties:
        base_url:
          type: string
          format: uri
          description: The agent's root URL. Platform will probe {base_url}/v1/status.
        namespace:
          type: ["string", "null"]
          description: Requested namespace.
        api_key:
          type: ["string", "null"]
          description: API key for the platform to authenticate when calling the agent.
        tags:
          type: array
          items:
            type: string
          default: []

    AgentRegistrationResponse:
      type: object
      required: [agent_id, base_url, registered_at, status, heartbeat_interval_seconds, heartbeat_url]
      description: Successful registration response.
      properties:
        agent_id:
          type: string
        base_url:
          type: string
          format: uri
        namespace:
          type: ["string", "null"]
        registered_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, degraded, failed]
        heartbeat_interval_seconds:
          type: integer
          minimum: 10
        heartbeat_url:
          type: string
          format: uri

    AgentRegistrationRecord:
      type: object
      required: [agent_id, base_url, status, registered_at]
      description: A single agent registration record.
      properties:
        agent_id:
          type: string
        base_url:
          type: string
          format: uri
        namespace:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, degraded, failed]
        registered_at:
          type: string
          format: date-time
        last_heartbeat_at:
          type: ["string", "null"]
          format: date-time
        cached_status:
          oneOf:
            - $ref: "#/components/schemas/AgentStatus"
            - type: "null"

    AgentRegistryList:
      type: object
      required: [agents, total]
      description: Paginated list of registered agents.
      properties:
        agents:
          type: array
          items:
            $ref: "#/components/schemas/AgentRegistrationRecord"
        total:
          type: integer
          minimum: 0

    Heartbeat:
      type: object
      description: Lightweight liveness signal from a registered agent.
      properties:
        ok:
          type: boolean
          default: true
        lifecycle:
          type: ["string", "null"]
          enum: [idle, starting, running, blocked, degraded, failed, null]
        pending_tasks:
          type: integer
          minimum: 0
          default: 0
        timestamp:
          type: string
          format: date-time

    HeartbeatAck:
      type: object
      required: [ack]
      properties:
        ack:
          type: boolean
        next_heartbeat_at:
          type: string
          format: date-time

    ProbeResult:
      type: object
      required: [agent_id, probed_at]
      description: Result of a platform-initiated health probe.
      properties:
        agent_id:
          type: string
        status:
          type: string
          enum: [active, failed]
        lifecycle:
          type: string
        probed_at:
          type: string
          format: date-time
        cached_status:
          $ref: "#/components/schemas/AgentStatus"
        error_code:
          type: string
        error_message:
          type: string

    AIPMessage:
      type: object
      required: [version, message_id, from, to, action, intent]
      description: AIP message envelope.
      properties:
        version:
          type: string
          default: "1.0"
        message_id:
          type: string
        correlation_id:
          type: ["string", "null"]
        trace_id:
          type: ["string", "null"]
        parent_task_id:
          type: ["string", "null"]
        from:
          type: string
        to:
          type: string
        from_role:
          type: ["string", "null"]
        to_role:
          type: ["string", "null"]
        to_host:
          type: ["string", "null"]
        to_base_url:
          type: ["string", "null"]
          format: uri
        route_scope:
          type: string
          enum: [local, remote]
          default: local
        action:
          type: string
        intent:
          type: string
        payload:
          type: object
          default: {}
          additionalProperties: true
        expected_output:
          type: ["string", "null"]
        constraints:
          type: array
          items:
            type: string
          default: []
        priority:
          type: string
          enum: [low, normal, high, urgent]
          default: normal
        status:
          type: string
          enum: [Pending, InProgress, Completed, Failed]
          default: Pending
        authority_weight:
          type: integer
          minimum: 0
          maximum: 100
          default: 50
        requires_approval:
          type: boolean
          default: false
        approval_state:
          type: string
          enum: [not_required, waiting_human, approved, rejected]
          default: not_required
        callback_url:
          type: ["string", "null"]
          format: uri
          description: Webhook URL where the receiver should POST task results upon completion.
        callback_secret:
          type: ["string", "null"]
          description: Shared secret for HMAC-SHA256 signature verification of callback payloads.
        retries:
          type: integer
          minimum: 0
          default: 0
        latency_ms:
          type: ["integer", "null"]
        error_code:
          type: ["string", "null"]
        error_message:
          type: ["string", "null"]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AIPAck:
      type: object
      required: [ok, message_id, to, status]
      description: Standard acknowledgment for POST /aip.
      properties:
        ok:
          type: boolean
        message_id:
          type: string
        to:
          type: string
        status:
          type: string
          enum: [received, queued, rejected]
        task_id:
          type: ["string", "null"]
          description: Task identifier if the message triggered a task.
        error_code:
          type: ["string", "null"]
          description: Machine-readable error code (present when ok is false).
        error_message:
          type: ["string", "null"]
          description: Human-readable error description (present when ok is false).
        correlation_id:
          type: ["string", "null"]

    AIPTask:
      type: object
      required: [task_id, message_id, state, from, to, action, intent, created_at, updated_at]
      description: A long-running task tracked by the agent.
      properties:
        task_id:
          type: string
        message_id:
          type: string
        trace_id:
          type: ["string", "null"]
          description: End-to-end trace identifier (propagated from originating message).
        correlation_id:
          type: ["string", "null"]
          description: Request-response correlation identifier.
        parent_task_id:
          type: ["string", "null"]
          description: Parent task ID for sub-task decomposition.
        state:
          type: string
          enum: [submitted, working, input-required, completed, failed, canceled]
        from:
          type: string
        to:
          type: string
        action:
          type: string
        intent:
          type: string
        progress:
          type: ["number", "null"]
          minimum: 0
          maximum: 1
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/Artifact"
          default: []
        history:
          type: array
          items:
            type: object
          default: []
        error_code:
          type: ["string", "null"]
        error_message:
          type: ["string", "null"]
        metadata:
          type: ["object", "null"]
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Artifact:
      type: object
      required: [artifact_id, name, mime_type]
      description: A file, document, or structured data produced during task execution.
      properties:
        artifact_id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        mime_type:
          type: string
        uri:
          type: ["string", "null"]
          format: uri
        inline_data:
          type: ["string", "null"]
          description: Base64-encoded content for small artifacts.
        metadata:
          type: ["object", "null"]
          additionalProperties: true

    ArtifactUploadResponse:
      type: object
      required: [artifact_id, name, mime_type, uri, created_at]
      description: Response returned after a successful artifact upload via POST /v1/artifacts.
      properties:
        artifact_id:
          type: string
        name:
          type: string
        mime_type:
          type: string
        uri:
          type: string
          format: uri
          description: Permanent URL to fetch this artifact.
        size_bytes:
          type: integer
          minimum: 0
          description: Size of the uploaded file in bytes.
        created_at:
          type: string
          format: date-time

    Presentation:
      type: object
      required: [display_name]
      description: Human-facing display metadata for dashboards, agent cards, and marketplace UIs.
      properties:
        display_name:
          type: string
          description: Short human-readable name for UI display.
        tagline:
          type: ["string", "null"]
          maxLength: 140
          description: One-line summary suitable for subtitle or tooltip.
        description:
          type: ["string", "null"]
          description: Longer human-readable description. Markdown MAY be used.
        icon_url:
          type: ["string", "null"]
          format: uri
          description: URL to an avatar or icon image (SHOULD be square, RECOMMENDED 256x256 min).
        color:
          type: ["string", "null"]
          pattern: "^#[0-9a-fA-F]{6}$"
          description: Brand / accent color as hex (e.g., "#4A90D9").
        locale:
          type: string
          pattern: "^[a-z]{2}(-[A-Z]{2})?$"
          description: BCP 47 language tag for all human-readable text in this response.
          default: en
        categories:
          type: array
          items:
            type: string
          description: UI categorization labels for marketplace-style discovery.
          default: []
        homepage_url:
          type: ["string", "null"]
          format: uri
          description: URL to the agent's documentation or homepage.
        privacy_policy_url:
          type: ["string", "null"]
          format: uri
          description: URL to the agent provider's privacy policy.
        tos_url:
          type: ["string", "null"]
          format: uri
          description: URL to the agent provider's terms of service.
        provider:
          type: ["object", "null"]
          description: Organization or individual that operates this agent.
          required: [name]
          properties:
            name:
              type: string
              description: Provider / organization name.
            url:
              type: ["string", "null"]
              format: uri

    Skill:
      type: object
      required: [id, name, description]
      description: Structured skill descriptor for rich agent discovery.
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
          default: []
        input_modes:
          type: array
          items:
            type: string
          default: ["application/json"]
        output_modes:
          type: array
          items:
            type: string
          default: ["application/json"]
        input_schema:
          type: ["object", "null"]
          additionalProperties: true
        output_schema:
          type: ["object", "null"]
          additionalProperties: true
        examples:
          type: array
          items:
            type: object
          default: []

    AuthenticationInfo:
      type: object
      description: Authentication schemes supported by the agent.
      properties:
        schemes:
          type: array
          items:
            type: string
          default: []
        oauth2:
          type: ["object", "null"]
          properties:
            token_url:
              type: string
              format: uri
            scopes:
              type: array
              items:
                type: string

    RateLimitInfo:
      type: object
      description: Rate limiting and quota information for client self-regulation.
      properties:
        max_requests_per_minute:
          type: ["integer", "null"]
          minimum: 0
          description: Maximum POST /v1/aip requests per minute. null = unlimited.
        max_requests_per_day:
          type: ["integer", "null"]
          minimum: 0
          description: Maximum requests per calendar day (UTC). null = unlimited.
        max_concurrent_tasks:
          type: ["integer", "null"]
          minimum: 0
          description: Maximum simultaneous tasks in non-terminal state. null = unlimited.
        remaining_requests:
          type: ["integer", "null"]
          minimum: 0
          description: Remaining requests in the current minute window.
        remaining_tasks:
          type: ["integer", "null"]
          minimum: 0
          description: Remaining task slots available.
        reset_at:
          type: ["string", "null"]
          format: date-time
          description: ISO 8601 UTC timestamp when the rate limit window resets.

    StatusEndpoints:
      type: object
      properties:
        aip:
          type: ["string", "null"]
          format: uri
        status:
          type: ["string", "null"]
          format: uri

    WorkSnapshot:
      type: object
      properties:
        tasks:
          type: array
          items:
            type: object
          default: []
        reports:
          type: array
          items:
            type: object
          default: []
        recent_messages:
          type: array
          items:
            type: object
          default: []
        last_seen:
          type: ["string", "null"]
          format: date-time
        pending_tasks:
          type: integer
          minimum: 0
          default: 0

    AgentStatus:
      type: object
      required: [agent_id, role]
      description: Status document for a single agent.
      properties:
        agent_id:
          type: string
          description: Unique machine identifier for this agent.
        role:
          type: string
          description: Agent's role in the group.
        namespace:
          type: ["string", "null"]
          description: Logical namespace for multi-tenant isolation (e.g., "acme-corp", "team-infra").
        presentation:
          oneOf:
            - $ref: "#/components/schemas/Presentation"
            - type: "null"
          description: Human-facing display metadata for dashboards, agent cards, and marketplace UIs.
        superior:
          type: ["string", "null"]
        authority_weight:
          type: ["integer", "null"]
        lifecycle:
          type: ["string", "null"]
          enum: [idle, starting, running, blocked, degraded, failed, null]
        port:
          type: ["integer", "null"]
        ok:
          type: boolean
          default: true
        base_url:
          type: ["string", "null"]
          format: uri
        endpoints:
          oneOf:
            - $ref: "#/components/schemas/StatusEndpoints"
            - type: "null"
        capabilities:
          type: array
          items:
            type: string
          default: []
        skills:
          type: array
          items:
            $ref: "#/components/schemas/Skill"
          default: []
        supported_versions:
          type: array
          items:
            type: string
          default: ["1.0"]
        authentication:
          oneOf:
            - $ref: "#/components/schemas/AuthenticationInfo"
            - type: "null"
        rate_limits:
          oneOf:
            - $ref: "#/components/schemas/RateLimitInfo"
            - type: "null"
          description: Rate limiting and quota information.
        pending_tasks:
          type: integer
          default: 0
        recent_errors:
          type: integer
          default: 0
        waiting_for_approval:
          type: boolean
          default: false
        last_message_at:
          type: ["string", "null"]
          format: date-time
        last_seen_at:
          type: ["string", "null"]
          format: date-time
        metadata:
          type: ["object", "null"]
          additionalProperties: true
        work:
          oneOf:
            - $ref: "#/components/schemas/WorkSnapshot"
            - type: "null"

    RecursiveStatusNode:
      type: object
      required: [self]
      description: Recursive status tree.
      properties:
        self:
          $ref: "#/components/schemas/AgentStatus"
        subordinates:
          type: array
          items:
            $ref: "#/components/schemas/RecursiveStatusNode"
          default: []

    GroupStatus:
      type: object
      required: [ok, root_agent_id, agents]
      description: Flat group-wide status document.
      properties:
        ok:
          type: boolean
        service:
          type: string
          default: aip
        namespace:
          type: ["string", "null"]
          description: Namespace of this agent group.
        root_agent_id:
          type: string
        timestamp:
          type: string
          format: date-time
        topology:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          default: {}
        waiting_for_approval:
          type: boolean
          default: false
        agents:
          type: array
          items:
            $ref: "#/components/schemas/AgentStatus"

    # ── Observability schemas ───────────────────────────────────────

    TraceEvent:
      type: object
      required: [event_id, trace_id, agent_id, trace_type, timestamp]
      description: A single observable event in an agent system.
      properties:
        event_id:
          type: string
        trace_id:
          type: string
        agent_id:
          type: string
        trace_type:
          type: string
          description: "Standard types: aip.message.sent, aip.message.received, task.created, task.working, task.completed, task.failed, task.canceled, task.input_required, llm.request, llm.response, llm.usage, tool.call, tool.result, report, conversation, approval, error, log"
        severity:
          type: string
          enum: [TRACE, DEBUG, INFO, WARN, ERROR, FATAL]
          default: INFO
        timestamp:
          type: string
          format: date-time
        correlation_id:
          type: ["string", "null"]
        parent_event_id:
          type: ["string", "null"]
        span_id:
          type: ["string", "null"]
        parent_span_id:
          type: ["string", "null"]
        task_id:
          type: ["string", "null"]
        message_id:
          type: ["string", "null"]
        summary:
          type: ["string", "null"]
        payload:
          type: object
          default: {}
        metadata:
          type: ["object", "null"]
        tags:
          type: array
          items:
            type: string
          default: []
        duration_ms:
          type: ["integer", "null"]
        namespace:
          type: ["string", "null"]

    TraceBatch:
      type: object
      required: [events]
      description: Batch of trace events for bulk emission.
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/TraceEvent"

    TraceQueryResult:
      type: object
      required: [events, total, limit, offset, has_more]
      description: Paginated trace query result.
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/TraceEvent"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        has_more:
          type: boolean

    LLMUsage:
      type: object
      required: [model, prompt_tokens, completion_tokens, total_tokens]
      description: Token and cost data for a single LLM invocation.
      properties:
        model:
          type: string
        provider:
          type: ["string", "null"]
        prompt_tokens:
          type: integer
          default: 0
        completion_tokens:
          type: integer
          default: 0
        total_tokens:
          type: integer
          default: 0
        cached_tokens:
          type: integer
          default: 0
        estimated_cost_usd:
          type: ["number", "null"]
        duration_ms:
          type: ["integer", "null"]
        request_id:
          type: ["string", "null"]
        agent_id:
          type: ["string", "null"]
        task_id:
          type: ["string", "null"]
        trace_id:
          type: ["string", "null"]

    ModelUsageBreakdown:
      type: object
      required: [model]
      properties:
        model:
          type: string
        provider:
          type: ["string", "null"]
        requests:
          type: integer
          default: 0
        prompt_tokens:
          type: integer
          default: 0
        completion_tokens:
          type: integer
          default: 0
        total_tokens:
          type: integer
          default: 0
        cached_tokens:
          type: integer
          default: 0
        estimated_cost_usd:
          type: number
          default: 0.0

    AgentUsageBreakdown:
      type: object
      required: [agent_id]
      properties:
        agent_id:
          type: string
        requests:
          type: integer
          default: 0
        total_tokens:
          type: integer
          default: 0
        estimated_cost_usd:
          type: number
          default: 0.0
        by_model:
          type: array
          items:
            $ref: "#/components/schemas/ModelUsageBreakdown"
          default: []

    UsageSummary:
      type: object
      required: [period_start, period_end]
      description: Aggregated LLM usage summary.
      properties:
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        namespace:
          type: ["string", "null"]
        total_requests:
          type: integer
          default: 0
        total_prompt_tokens:
          type: integer
          default: 0
        total_completion_tokens:
          type: integer
          default: 0
        total_tokens:
          type: integer
          default: 0
        total_cached_tokens:
          type: integer
          default: 0
        total_estimated_cost_usd:
          type: number
          default: 0.0
        by_model:
          type: array
          items:
            $ref: "#/components/schemas/ModelUsageBreakdown"
          default: []
        by_agent:
          type: array
          items:
            $ref: "#/components/schemas/AgentUsageBreakdown"
          default: []
